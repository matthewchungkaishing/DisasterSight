project:
  name: DisasterSight
  mode: local_demo
  random_seed: 42

paths:
  data_root: data
  raw_data_dir: data/raw
  xbd_root: data/raw/xbd
  interim_data_dir: data/interim
  processed_data_dir: data/processed
  cache_dir: data/cache
  artifacts_dir: artifacts
  checkpoints_dir: artifacts/checkpoints
  predictions_dir: artifacts/predictions
  figures_dir: artifacts/figures
  manifests_dir: artifacts/manifests

dataset:
  name: xbd
  use_small_subset: true
  # Small subsets are selected by whole disaster events to avoid train/val/test leakage.
  small_subset_max_scenes: 300
  small_subset_disaster_names:
    - guatemala-volcano
    - mexico-earthquake
    - palu-tsunami
  small_subset_disaster_types: []
  subset_strategy: event_aware
  image_size: 224
  crop_padding_pixels: 12
  min_building_area_pixels: 32
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  allowed_disasters:
    - hurricane
    - earthquake
    - flood
    - wildfire

labels:
  damage_classes:
    - no_damage
    - minor_damage
    - major_damage
    - destroyed
  background_label: unclassified
  review_required_label: review_required
  unknown_label: unknown

training:
  batch_size: 16
  num_workers: 2
  learning_rate: 0.0003
  max_epochs: 10
  early_stopping_patience: 3
  # Class-imbalance strategy for the xBD crop set (minor_damage is heavily under-represented).
  # Options: loss_weight | sampler | both | none
  # loss_weight: inverse-frequency weights on CrossEntropyLoss
  # sampler:     WeightedRandomSampler so each class appears equally per epoch
  # both:        apply both (strongest correction, can cause overfitting on small sets)
  class_weight_strategy: loss_weight
  backbone: resnet18
  dropout: 0.3

inference:
  cache_predictions: true
  confidence_threshold: 0.6
  review_threshold: 0.5

dashboard:
  scene_explorer_max_pane_height_px: 420
  scene_explorer_estimated_width_px: 960

priority_score:
  destroyed_weight: 0.50
  major_damage_weight: 0.30
  damage_density_weight: 0.20
